<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anki World Map</title>

  <!-- MapLibre GL CSS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">

  <!-- 自前のCSS（ステップ2以降で作る） -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 地図を表示するコンテナ -->
  <div id="bm-worldmap"></div>

  <!-- 検索ボックス -->
  <button id="search-toggle">🔍</button>

  <div class="search-container" id="search-container">
    <div class="search-wrapper">
      <input type="text" id="search-input" class="search-input" placeholder="Type region names...">
      <button id="clear-button" class="clear-button">✕</button>
    </div>
    <div id="progress-display" class="progress-display"></div>
  </div>

  <!-- メニュー -->
  <div id="menu-container">
    <button id="menu-toggle">☰</button>
    <div id="menu-buttons" style="display:none;">
      <button id="btn-maps">Maps</button>
      <button id="btn-layers">Layers</button>
      <button id="btn-regions">Regions</button>
    </div>

    <!-- パネルをmenu-containerの中に移動 -->
    <div id="maps-panel" class="menu-panel" style="display:none;">
      <label><input type="radio" name="projection" value="mercator" checked> Mercator</label><br>
      <label><input type="radio" name="projection" value="globe"> Globe</label>
    </div>

    <div id="layers-panel" class="menu-panel" style="display:none;">
      <label><input type="checkbox" id="layer_world" checked> World</label><br>
      <label><input type="checkbox" id="layer_capitals"> Capitals</label><br>
      <label><input type="checkbox" id="layer_usaStates"> USA States</label><br>
      <label><input type="checkbox" id="layer_meridians"> Meridians</label><br>
      <label><input type="checkbox" id="layer_parallels"> Parallels</label>
    </div>

    <div id="region-control" class="menu-panel" style="display:none;"></div>
  </div>

  <!-- Regionsパネル -->
  <div id="region-control" class="menu-panel" style="display:none;"></div>

  <!-- 外部ライブラリ -->
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <!-- データ（先に読み込む） -->
  <script src="data/regions.js"></script>
  <script src="data/subdivisions.js"></script>

  <!-- ロジック（後で分割していく） -->
  <script src="js/main.js"></script>

</body>
</html>
